  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

xt              */\n    --paper:      #fdf6ff;   /* page background (warm lilac white)    */\n    --card:       #ffffff;\n    --line:       #e7dcf2;\n\n    /* ── RB pastel palette (verbatim from levels.ts) ── */\n    --red:    #ff5d6c; --red-sh:    #c2364a; --red-lt:    #ffb3bb;\n    --orange: #ff9f43; --orange-sh: #cf6f1e; --orange-lt: #ffd39e;\n    --yellow: #ffd93b; --yellow-sh: #d4a700; --yellow-lt: #fff0a3;\n    --green:  #5fd97a; --green-sh:  #2f9e4c; --green-lt:  #bdf3c8;\n    --teal:   #3fd0d6; --teal-sh:   #1c9aa0; --teal-lt:   #a9eef0;\n    --blue:   #4db5ff; --blue-sh:   #1d7fcc; --blue-lt:   #b3dcff;\n    --purple: #a87cff; --purple-sh: #7148cc; --purple-lt: #dcc9ff;\n    --pink:   #ff7fc4; --pink-sh:   #cc4d93; --pink-lt:   #ffc4e4;\n\n    --radius: 22px;\n    --pageW: 940px;\n  }\n\n  *{ box-sizing:border-box; }\n  html{ -webkit-text-size-adjust:100%; }\n  body{\n    margin:0;\n    font-family:'Nunito', system-ui, sans-serif;\n    color:var(--ink);\n    background:\n      radial-gradient(1200px 600px at 80% -8%, #ffe9f6 0%, rgba(255,233,246,0) 60%),\n      radial-gradient(1100px 620px at 0% 4%, #e6f3ff 0%, rgba(230,243,255,0) 55%),\n      var(--paper);\n    line-height:1.62;\n  }\n  .wrap{ max-width:var(--pageW); margin:0 auto; padding:0 28px 140px; }\n\n  /* ── headings / type ─────────────────────────────── */\n  h1,h2,h3,h4{ font-family:'Fredoka', sans-serif; font-weight:600; letter-spacing:-.01em; line-height:1.08; }\n  h2{ font-size:30px; margin:0 0 6px; }\n  h3{ font-size:21px; margin:30px 0 8px; }\n  h4{ font-size:15px; margin:22px 0 6px; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-soft); font-weight:600; }\n  p{ margin:0 0 14px; max-width:68ch; text-wrap:pretty; }\n  strong{ font-weight:800; }\n  a{ color:var(--purple-sh); }\n  code, .mono{ font-family:'JetBrains Mono', monospace; font-size:.86em; }\n  p code, li code{ background:#f1e9fb; border:1px solid var(--line); border-radius:6px; padding:1px 6px; color:var(--purple-sh); white-space:nowrap; }\n\n  /* ── hero ────────────────────────────────────────── */\n  header.hero{ padding:64px 0 30px; }\n  .kicker{\n    display:inline-flex; align-items:center; gap:9px;\n    font-family:'Fredoka',sans-serif; font-weight:600; font-size:13px; letter-spacing:.16em; text-transform:uppercase;\n    color:var(--ink); background:#fff;\n    border:3px solid var(--ink); border-radius:999px; padding:7px 16px;\n    box-shadow:0 4px 0 var(--ink);\n  }\n  .kicker .dot{ width:11px; height:11px; border-radius:50%; background:var(--pink); border:2.5px solid var(--ink); }\n  header.hero h1{ font-size:52px; font-weight:700; margin:24px 0 18px; letter-spacing:-.02em; line-height:1.12; }\n  header.hero h1 .tint{\n    background:linear-gradient(96deg,var(--pink-sh),var(--purple-sh) 55%,var(--blue-sh));\n    -webkit-background-clip:text; background-clip:text; color:transparent;\n  }\n  .lede{ font-size:19px; color:var(--ink-soft); max-width:60ch; }\n  .meta-row{ display:flex; flex-wrap:wrap; gap:10px; margin-top:22px; }\n  .meta{\n    font-size:13px; font-weight:700; color:var(--ink-soft);\n    background:#fff; border:2px solid var(--line); border-radius:999px; padding:6px 14px;\n  }\n  .meta b{ color:var(--ink); }\n\n  /* ── section scaffold ────────────────────────────── */\n  section{ margin-top:54px; }\n  .sec-head{ display:flex; align-items:baseline; gap:14px; border-bottom:3px dashed var(--line); padding-bottom:14px; margin-bottom:24px; }\n  .sec-no{\n    font-family:'Fredoka',sans-serif; font-weight:700; font-size:15px;\n    color:#fff; background:var(--ink); border-radius:10px; padding:4px 11px; align-self:center;\n    box-shadow:0 3px 0 #1d1336;\n  }\n  .sec-head p{ margin:6px 0 0; }\n\n  /* ── generic card ────────────────────────────────── */\n  .card{\n    background:var(--card); border:3px solid var(--ink); border-radius:var(--radius);\n    box-shadow:0 6px 0 var(--ink); padding:24px 26px; margin:18px 0;\n  }\n  .card.flat{ box-shadow:0 6px 0 var(--line); border-color:var(--line); }\n  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }\n  .grid3{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }\n  @media(max-width:720px){ .grid2,.grid3{ grid-template-columns:1fr; } }\n\n  /* ── swatches ────────────────────────────────────── */\n  .swatches{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }\n  @media(max-width:620px){ .swatches{ grid-template-columns:repeat(2,1fr); } }\n  .sw{\n    border:3px solid var(--ink); border-radius:16px; overflow:hidden; background:#fff;\n    box-shadow:0 4px 0 var(--ink);\n  }\n  .sw .chip{ height:62px; display:flex; align-items:flex-end; justify-content:flex-end; padding:7px; gap:5px; }\n  .sw .chip i{ width:16px; height:16px; border-radius:50%; border:2px solid rgba(52,33,90,.5); display:block; }\n  .sw .lab{ padding:8px 11px 9px; }\n  .sw .lab b{ font-family:'Fredoka',sans-serif; font-size:14px; display:block; }\n  .sw .lab .mono{ font-size:11px; color:var(--ink-soft); display:block; line-height:1.5; }\n\n  /* ── ink-spec demo bricks ────────────────────────── */\n  .brickrow{ display:flex; flex-wrap:wrap; gap:14px; align-items:center; }\n  .demo-brick{\n    width:118px; height:50px; border-radius:13px; border:5px solid var(--ink);\n    box-shadow:0 5px 0 var(--ink); position:relative;\n    display:flex; align-items:center; justify-content:center;\n    font-family:'Fredoka',sans-serif; font-weight:600; color:var(--ink); font-size:13px;\n  }\n  .demo-brick::after{ /* top sheen */\n    content:\"\"; position:absolute; left:8px; right:8px; top:6px; height:9px; border-radius:6px;\n    background:rgba(255,255,255,.55);\n  }\n  .demo-ball{ width:46px; height:46px; border-radius:50%; border:5px solid var(--ink); box-shadow:0 5px 0 var(--ink); background:radial-gradient(circle at 35% 32%, #fff, var(--pink) 70%); }\n  .demo-paddle{ width:160px; height:30px; border-radius:16px; border:5px solid var(--ink); box-shadow:0 5px 0 var(--ink); background:linear-gradient(var(--teal-lt),var(--teal)); }\n\n  /* ── world preview cards ─────────────────────────── */\n  .world-card{ border:3px solid var(--ink); border-radius:var(--radius); overflow:hidden; box-shadow:0 6px 0 var(--ink); background:#fff; }\n  .world-sky{ height:128px; position:relative; display:flex; align-items:flex-end; padding:14px; }\n  .world-sky .twk{ position:absolute; border-radius:50%; background:#fff; opacity:.9; }\n  .world-tag{\n    font-family:'Fredoka',sans-serif; font-weight:600; color:var(--ink); font-size:13px;\n    background:#fff; border:2.5px solid var(--ink); border-radius:999px; padding:4px 12px; position:relative; z-index:2;\n    box-shadow:0 3px 0 var(--ink);\n  }\n  .world-body{ padding:16px 18px 18px; }\n  .world-body h3{ margin:0 0 2px; }\n  .world-body .lv{ font-size:13px; color:var(--ink-soft); font-weight:700; }\n  .world-body ol{ margin:10px 0 0; padding-left:18px; font-size:13.5px; color:var(--ink-soft); }\n  .world-body ol b{ color:var(--ink); }\n  .grad-line{ display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; }\n  .grad-line .g{ font-family:'JetBrains Mono',monospace; font-size:11px; background:#f6f0ff; border:1px solid var(--line); border-radius:6px; padding:2px 7px; }\n\n  /* ── table ───────────────────────────────────────── */\n  table{ width:100%; border-collapse:separate; border-spacing:0; font-size:14px; margin:6px 0 2px; }\n  th,td{ text-align:left; padding:11px 14px; border-bottom:2px solid var(--line); vertical-align:top; }\n  th{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); }\n  tbody tr:last-child td{ border-bottom:none; }\n  td .pill{ font-size:11px; }\n  .wpill{ display:inline-block; font-family:'Fredoka',sans-serif; font-weight:600; font-size:11px; color:#fff; border-radius:999px; padding:2px 9px; }\n  .w1{ background:var(--blue-sh); } .w2{ background:var(--purple-sh); }\n\n  /* ── code block ──────────────────────────────────── */\n  pre{\n    background:#2a1c47; color:#efe7ff; border:3px solid var(--ink); border-radius:16px;\n    padding:18px 20px; overflow:auto; box-shadow:0 6px 0 var(--ink);\n    font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.7; margin:14px 0;\n  }\n  pre .c{ color:#9d86c9; } pre .k{ color:#ff9fd0; } pre .s{ color:#a9eef0; } pre .n{ color:#ffd93b; } pre .f{ color:#8fd0ff; }\n  .note{ font-size:13px; color:var(--ink-soft); }\n\n  /* ── flow chips ──────────────────────────────────── */\n  .flow{ display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin:8px 0 4px; }\n  .state{\n    font-family:'Fredoka',sans-serif; font-weight:600; font-size:13px; color:var(--ink);\n    background:#fff; border:3px solid var(--ink); border-radius:12px; padding:7px 13px; box-shadow:0 4px 0 var(--ink);\n  }\n  .state.new{ background:var(--yellow-lt); }\n  .arrow{ font-weight:800; color:var(--ink-soft); font-size:18px; }\n  .arrow small{ display:block; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }\n\n  /* ── reco callout ────────────────────────────────── */\n  .reco{ display:flex; gap:14px; background:linear-gradient(180deg,#f3fff6,#e8fbef); border:3px solid var(--green-sh); border-radius:18px; padding:18px 20px; box-shadow:0 6px 0 var(--green-sh); }\n  .reco .ic{ font-size:26px; line-height:1; }\n  .reco h4{ margin:0 0 4px; color:var(--green-sh); }\n  .reco p{ margin:0; font-size:14px; color:#2f6e45; }\n\n  /* ════════════════════════════════════════════════════\n     MOCKUP — level select screen, 1080×1320 in-language\n     ════════════════════════════════════════════════════ */\n  .stage-wrap{ display:flex; justify-content:center; }\n  .device{\n    width:520px;                       /* 1080 scaled to 520 */\n    border:5px solid var(--ink); border-radius:38px; padding:14px; background:var(--ink);\n    box-shadow:0 14px 0 #1d1336, 0 30px 60px rgba(52,33,90,.32);\n  }\n  .scaler{ width:520px; height:635px; overflow:hidden; border-radius:26px; }\n  .screen{\n    width:1080px; height:1320px; transform:scale(.4815); transform-origin:top left;\n    position:relative; overflow:hidden; border-radius:54px;\n    font-family:'Fredoka',sans-serif; color:var(--ink);\n    /* level-select neutral pastel sky (proposed) */\n    background:linear-gradient(180deg,#bfe6ff 0%, #dff1ff 30%, #fdeffa 72%, #ffe7f4 100%);\n  }\n  .screen .sky-twk{ position:absolute; border-radius:50%; background:#fff; opacity:.85; }\n  .screen .cloud{ position:absolute; background:#fff; border-radius:60px; opacity:.9; box-shadow:0 0 0 6px rgba(255,255,255,.55); }\n\n  /* screen top bar */\n  .scr-top{ position:relative; height:150px; display:flex; align-items:center; justify-content:center; }\n  .scr-back{ position:absolute; left:46px; top:46px; width:74px; height:74px; border-radius:20px; background:#fff; border:6px solid var(--ink); box-shadow:0 7px 0 var(--ink); display:flex; align-items:center; justify-content:center; font-size:38px; font-weight:700; }\n  .scr-title{ font-size:52px; font-weight:700; letter-spacing:.01em; text-shadow:0 4px 0 #fff; }\n  .scr-prog{ position:absolute; right:46px; top:52px; background:var(--ink); color:#fff; border-radius:999px; padding:10px 22px; font-size:26px; font-weight:600; box-shadow:0 6px 0 #1d1336; }\n\n  /* world band */\n  .band{ padding:6px 60px 0; position:relative; }\n  .band-head{ display:flex; align-items:center; gap:18px; margin:30px 0 26px; }\n  .band-pill{ display:inline-flex; align-items:center; gap:14px; background:#fff; border:6px solid var(--ink); border-radius:999px; padding:12px 26px 12px 14px; box-shadow:0 8px 0 var(--ink); }\n  .band-pill .wno{ width:54px; height:54px; border-radius:50%; border:5px solid var(--ink); display:flex; align-items:center; justify-content:center; color:#fff; font-size:30px; font-weight:700; }\n  .band-pill .wtxt b{ font-size:32px; font-weight:700; display:block; line-height:1; white-space:nowrap; }\n  .band-pill .wtxt span{ font-size:19px; color:var(--ink-soft); font-weight:500; white-space:nowrap; }\n  .band-rule{ flex:1; height:0; border-top:6px dashed rgba(52,33,90,.28); }\n\n  /* tile row + connecting trail */\n  .tiles{ position:relative; display:flex; justify-content:space-between; padding:0 6px 8px; }\n  .trail{ position:absolute; left:90px; right:90px; top:96px; height:0; border-top:7px dashed rgba(52,33,90,.30); z-index:0; }\n\n  .tile{ position:relative; z-index:1; width:168px; }\n  .tile .pad{\n    width:168px; height:168px; border-radius:30px; border:7px solid var(--ink);\n    box-shadow:0 9px 0 var(--ink); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; position:relative;\n  }\n  .tile .num{ font-size:74px; font-weight:700; line-height:.9; }\n  .tile .nm{ font-size:20px; font-weight:600; color:var(--ink); text-align:center; margin-top:10px; opacity:.92; }\n  .tile .badge{ position:absolute; top:-18px; right:-14px; width:56px; height:56px; border-radius:50%; border:5px solid var(--ink); display:flex; align-items:center; justify-content:center; font-size:30px; box-shadow:0 5px 0 var(--ink); }\n\n  /* state: completed */\n  .tile.done .pad{ background:linear-gradient(180deg,#fff,#eafff0); }\n  .tile.done .num{ color:var(--green-sh); }\n  .tile.done .badge{ background:var(--yellow); }\n  .tile.done .score{ font-family:'JetBrains Mono',monospace; font-size:19px; font-weight:700; color:var(--ink-soft); margin-top:4px; }\n\n  /* state: current / unlocked-not-cleared */\n  .tile.cur .pad{ background:linear-gradient(180deg,#fff7c2,#ffe06b); box-shadow:0 9px 0 var(--ink), 0 0 0 7px rgba(255,217,59,.45), 0 0 44px rgba(255,159,67,.6); }\n  .tile.cur .num{ color:var(--orange-sh); }\n  .tile.cur .badge{ background:var(--orange); border-color:var(--ink); }\n  .tile.cur .play{ position:absolute; bottom:-22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; font-size:20px; font-weight:600; border-radius:999px; padding:7px 20px; box-shadow:0 6px 0 #1d1336; white-space:nowrap; }\n\n  /* state: locked */\n  .tile.lock .pad{ background:repeating-linear-gradient(135deg,#e7e0f0,#e7e0f0 14px,#ded5ec 14px,#ded5ec 28px); border-color:#9a8cb5; box-shadow:0 9px 0 #9a8cb5; }\n  .tile.lock .num{ color:#b3a6cc; }\n  .tile.lock .badge{ background:#cfc4e4; border-color:#9a8cb5; box-shadow:0 5px 0 #9a8cb5; color:#6a5a8c; }\n  .tile.lock .nm{ color:#b3a6cc; }\n\n  /* world 2 band uses dusk tint behind */\n  .band.dusk{ }\n  .band.dusk::before{\n    content:\"\"; position:absolute; inset:8px 30px 18px; border-radius:34px;\n    background:linear-gradient(180deg, rgba(91,75,158,.16), rgba(217,143,208,.16));\n    z-index:-1;\n  }\n\n  .scr-foot{ text-align:center; font-size:24px; color:var(--ink-soft); font-weight:600; margin-top:14px; }\n\n  .legend{ display:flex; flex-wrap:wrap; gap:18px; margin-top:20px; }\n  .legend .it{ display:flex; align-items:center; gap:10px; font-size:13.5px; font-weight:700; }\n  .legend .sq{ width:34px; height:34px; border-radius:9px; border:3px solid var(--ink); box-shadow:0 3px 0 var(--ink); }\n  .legend .sq.d{ background:linear-gradient(180deg,#fff,#eafff0); }\n  .legend .sq.c{ background:linear-gradient(180deg,#fff7c2,#ffe06b); }\n  .legend .sq.l{ background:repeating-linear-gradient(135deg,#e7e0f0,#e7e0f0 7px,#ded5ec 7px,#ded5ec 14px); border-color:#9a8cb5; box-shadow:0 3px 0 #9a8cb5; }\n\n  .caption{ text-align:center; font-size:13px; color:var(--ink-soft); margin-top:16px; font-weight:700; }\n\n  footer.doc{ margin-top:70px; padding-top:24px; border-top:3px dashed var(--line); font-size:13px; color:var(--ink-soft); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }\n\n  ul.tight{ margin:6px 0 14px; padding-left:20px; }\n  ul.tight li{ margin:4px 0; }\n\n  @media print{\n    body{ background:#fff; }\n    .card,.world-card,.sw,pre,.device{ box-shadow:none !important; }\n    section{ break-inside:avoid; }\n  }\n  @media(max-width:560px){\n    header.hero h1{ font-size:42px; }\n    .device,.scaler,.screen{ } /* device stays fixed-scale, horizontally scrollable */\n    .stage-wrap{ overflow-x:auto; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"wrap\">\n\n  <!-- ════════ HERO ════════ -->\n  <header class=\"hero\">\n    <span class=\"kicker\"><span class=\"dot\"><\u002Fspan>Brickles · Design Spec<\u002Fspan>\n    <h1>Worlds &amp; the <span class=\"tint\">Level Select<\u002Fspan> screen<\u002Fh1>\n    <p class=\"lede\">A written proposal for two things: (1) formalising the <strong>soft-pastel + dark-ink-outline<\u002Fstrong> visual language and mapping it onto two worlds, and (2) a level-select screen with a real unlock + save system. Concrete hex throughout — the background is code, not art, so every value here is build-ready.<\u002Fp>\n    <div class=\"meta-row\">\n      <span class=\"meta\"><b>Scope<\u002Fb> · spec + mockup, not implementation<\u002Fspan>\n      <span class=\"meta\"><b>Canvas<\u002Fb> · 1080 × 1320 portrait<\u002Fspan>\n      <span class=\"meta\"><b>Ink<\u002Fb> · #34215a<\u002Fspan>\n      <span class=\"meta\"><b>Levels<\u002Fb> · 10 → 2 worlds<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ════════ 1 · VISUAL LANGUAGE ════════ -->\n  <section>\n    <div class=\"sec-head\">\n      <span class=\"sec-no\">01<\u002Fspan>\n      <div>\n        <h2>The pastel-and-ink language<\u002Fh2>\n        <p>Three rules make everything look like it belongs in the same sticker book.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid3\">\n      <div class=\"card\">\n        <h4>Rule 1 — One ink<\u002Fh4>\n        <p style=\"font-size:14px;\">Every shape is outlined in the <strong>same<\u002Fstrong> deep-grape ink — <code>#34215a<\u002Fcode>. Never black, never per-colour outlines. This single line weight + colour is what fuses the palette together.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h4>Rule 2 — Pastel fill, three tones<\u002Fh4>\n        <p style=\"font-size:14px;\">Each hue ships as a trio: a <strong>fill<\u002Fstrong>, a darker <strong>shade<\u002Fstrong> (text / bottom edge), and a <strong>light<\u002Fstrong> (sheen / particles). Straight from <code>RB<\u002Fcode> in <span class=\"mono\">levels.ts<\u002Fspan>.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h4>Rule 3 — Chunky drop, no blur<\u002Fh4>\n        <p style=\"font-size:14px;\">The “sticker” depth is a <strong>hard offset shadow<\u002Fstrong> in ink (e.g. <code>0 6px 0 #34215a<\u002Fcode>) plus a top sheen — not a soft blur. Corners are generously rounded.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>The palette — exact values from <span class=\"mono\">levels.ts<\u002Fspan><\u002Fh3>\n    <div class=\"swatches\">\n      <div class=\"sw\"><div class=\"chip\" style=\"background:#ff5d6c\"><i style=\"background:#c2364a\"><\u002Fi><i style=\"background:#ffb3bb\"><\u002Fi><\u002Fdiv><div class=\"lab\"><b>red<\u002Fb><span class=\"mono\">fill&nbsp;&nbsp;#ff5d6c<br>shade #c2364a<br>light #ffb3bb<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chip\" style=\"background:#ff9f43\"><i style=\"background:#cf6f1e\"><\u002Fi><i style=\"background:#ffd39e\"><\u002Fi><\u002Fdiv><div class=\"lab\"><b>orange<\u002Fb><span class=\"mono\">fill&nbsp;&nbsp;#ff9f43<br>shade #cf6f1e<br>light #ffd39e<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chip\" style=\"background:#ffd93b\"><i style=\"background:#d4a700\"><\u002Fi><i style=\"background:#fff0a3\"><\u002Fi><\u002Fdiv><div class=\"lab\"><b>yellow<\u002Fb><span class=\"mono\">fill&nbsp;&nbsp;#ffd93b<br>shade #d4a700<br>light #fff0a3<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chip\" style=\"background:#5fd97a\"><i style=\"background:#2f9e4c\"><\u002Fi><i style=\"background:#bdf3c8\"><\u002Fi><\u002Fdiv><div class=\"lab\"><b>green<\u002Fb><span class=\"mono\">fill&nbsp;&nbsp;#5fd97a<br>shade #2f9e4c<br>light #bdf3c8<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chip\" style=\"background:#3fd0d6\"><i style=\"background:#1c9aa0\"><\u002Fi><i style=\"background:#a9eef0\"><\u002Fi><\u002Fdiv><div class=\"lab\"><b>teal<\u002Fb><span class=\"mono\">fill&nbsp;&nbsp;#3fd0d6<br>shade #1c9aa0<br>light #a9eef0<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chip\" style=\"background:#4db5ff\"><i style=\"background:#1d7fcc\"><\u002Fi><i style=\"background:#b3dcff\"><\u002Fi><\u002Fdiv><div class=\"lab\"><b>blue<\u002Fb><span class=\"mono\">fill&nbsp;&nbsp;#4db5ff<br>shade #1d7fcc<br>light #b3dcff<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chip\" style=\"background:#a87cff\"><i style=\"background:#7148cc\"><\u002Fi><i style=\"background:#dcc9ff\"><\u002Fi><\u002Fdiv><div class=\"lab\"><b>purple<\u002Fb><span class=\"mono\">fill&nbsp;&nbsp;#a87cff<br>shade #7148cc<br>light #dcc9ff<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chip\" style=\"background:#ff7fc4\"><i style=\"background:#cc4d93\"><\u002Fi><i style=\"background:#ffc4e4\"><\u002Fi><\u002Fdiv><div class=\"lab\"><b>pink<\u002Fb><span class=\"mono\">fill&nbsp;&nbsp;#ff7fc4<br>shade #cc4d93<br>light #ffc4e4<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid2\" style=\"margin-top:22px;\">\n      <div class=\"card\">\n        <h4>Outline spec<\u002Fh4>\n        <table>\n          <tbody>\n            <tr><td><b>Ink colour<\u002Fb><\u002Ftd><td class=\"mono\">#34215a<\u002Ftd><\u002Ftr>\n            <tr><td><b>Outline weight<\u002Fb><\u002Ftd><td>bricks 5px · ball/paddle 5px · UI tiles 6–7px<\u002Ftd><\u002Ftr>\n            <tr><td><b>Drop offset<\u002Fb><\u002Ftd><td class=\"mono\">0 (5–9)px 0 #34215a<\u002Ftd><td>hard, no blur<\u002Ftd><\u002Ftr>\n            <tr><td><b>Corner radius<\u002Fb><\u002Ftd><td>bricks 13px · tiles 28–30px · pills 999px<\u002Ftd><\u002Ftr>\n            <tr><td><b>Sheen<\u002Fb><\u002Ftd><td>top inset bar, <span class=\"mono\">rgba(255,255,255,.55)<\u002Fspan><\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h4>The language, applied<\u002Fh4>\n        <div class=\"brickrow\" style=\"margin-top:6px;\">\n          <div class=\"demo-brick\" style=\"background:#4db5ff;border-bottom-width:8px;\">blue<\u002Fdiv>\n          <div class=\"demo-brick\" style=\"background:#5fd97a;border-bottom-width:8px;\">green<\u002Fdiv>\n          <div class=\"demo-brick\" style=\"background:#ff7fc4;border-bottom-width:8px;\">pink<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"brickrow\" style=\"margin-top:18px;\">\n          <div class=\"demo-paddle\"><\u002Fdiv>\n          <div class=\"demo-ball\"><\u002Fdiv>\n          <span class=\"note\">Same ink, same hard shadow, same rounding — paddle, ball and brick read as one set.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h4>Type<\u002Fh4>\n    <p><strong>Fredoka<\u002Fstrong> (already in-engine) stays the display + UI face — rounded, friendly, legible at the small sizes a level grid needs. Body copy in this spec is <strong>Nunito<\u002Fstrong>, its softer companion. No third family.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ════════ 2 · WORLDS ════════ -->\n  <section>\n    <div class=\"sec-head\">\n      <span class=\"sec-no\">02<\u002Fspan>\n      <div>\n        <h2>Two worlds across ten levels<\u002Fh2>\n        <p>The 10 levels already split cleanly by mood and difficulty — the “original six” relax into daylight, the “new four” push into candy-night. I propose <strong>5 + 5<\u002Fstrong>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid2\">\n      <!-- WORLD 1 -->\n      <div class=\"world-card\">\n        <div class=\"world-sky\" style=\"background:linear-gradient(180deg,#9ed8ff 0%,#c5ecff 50%,#eafff4 100%);\">\n          <span class=\"twk\" style=\"width:10px;height:10px;left:18%;top:24%\"><\u002Fspan>\n          <span class=\"twk\" style=\"width:7px;height:7px;left:62%;top:18%\"><\u002Fspan>\n          <span class=\"twk\" style=\"width:13px;height:13px;left:80%;top:40%\"><\u002Fspan>\n          <span class=\"twk\" style=\"width:8px;height:8px;left:40%;top:30%\"><\u002Fspan>\n          <span class=\"world-tag\">Levels 1–5 · daytime<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"world-body\">\n          <h3>World 1 — Meadow &amp; Sky<\u002Fh3>\n          <div class=\"lv\"><span class=\"wpill w1\">WORLD 1<\u002Fspan> &nbsp;gentle ramp · soft blue daylight<\u002Fdiv>\n          <ol>\n            <li><b>Rainbow Land<\u002Fb> — the warm-up<\u002Fli>\n            <li><b>Sprite Meadow<\u002Fb> — first power-ups<\u002Fli>\n            <li><b>Twin Hearts<\u002Fb> — shape play<\u002Fli>\n            <li><b>Color Castle<\u002Fb> — first strong bricks<\u002Fli>\n            <li><b>Sky Sprinkle<\u002Fb> — tricky lanes<\u002Fli>\n          <\u002Fol>\n          <div class=\"grad-line\">\n            <span class=\"g\">#9ed8ff<\u002Fspan><span class=\"g\">#c5ecff<\u002Fspan><span class=\"g\">#eafff4<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- WORLD 2 -->\n      <div class=\"world-card\">\n        <div class=\"world-sky\" style=\"background:linear-gradient(180deg,#4a3b8f 0%,#8a5fc0 48%,#d98fd0 100%);\">\n          <span class=\"twk\" style=\"width:11px;height:11px;left:14%;top:20%\"><\u002Fspan>\n          <span class=\"twk\" style=\"width:8px;height:8px;left:30%;top:46%\"><\u002Fspan>\n          <span class=\"twk\" style=\"width:13px;height:13px;left:55%;top:24%\"><\u002Fspan>\n          <span class=\"twk\" style=\"width:7px;height:7px;left:72%;top:52%\"><\u002Fspan>\n          <span class=\"twk\" style=\"width:10px;height:10px;left:86%;top:30%\"><\u002Fspan>\n          <span class=\"world-tag\">Levels 6–10 · candy-night<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"world-body\">\n          <h3>World 2 — Starlight &amp; Sugar<\u002Fh3>\n          <div class=\"lv\"><span class=\"wpill w2\">WORLD 2<\u002Fspan> &nbsp;the hard stretch · dusk + more twinkles<\u002Fdiv>\n          <ol>\n            <li><b>Star Burst<\u002Fb> — the turn into night<\u002Fli>\n            <li><b>Candy Stripe<\u002Fb> — a colourful breather<\u002Fli>\n            <li><b>Diamond Drop<\u002Fb> — facets &amp; cores<\u002Fli>\n            <li><b>Checkerboard<\u002Fb> — no safe lanes<\u002Fli>\n            <li><b>Final Flash<\u002Fb> — the fortress finale<\u002Fli>\n          <\u002Fol>\n          <div class=\"grad-line\">\n            <span class=\"g\">#4a3b8f<\u002Fspan><span class=\"g\">#8a5fc0<\u002Fspan><span class=\"g\">#d98fd0<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"note\" style=\"margin-top:14px;\">Each world is just a <strong>sky gradient + twinkle density<\u002Fstrong> swap behind the existing brick field — cheap to add, and it gives the level-clear screen a “you crossed into night” beat between levels 5 and 6. The level-select screen below stays on a neutral pastel sky so both worlds sit comfortably together.<\u002Fp>\n\n    <h3>Data-model change<\u002Fh3>\n    <p>Two small additions to <span class=\"mono\">levels.ts<\u002Fspan>. Add an explicit <code>world<\u002Fcode> field to <code>Level<\u002Fcode> (explicit beats deriving from index — it survives reordering and lets a world span any range later), plus a <code>WORLDS<\u002Fcode> metadata array that owns the per-world theme so <span class=\"mono\">render.ts<\u002Fspan> can read sky stops without hard-coding them.<\u002Fp>\n<pre><span class=\"c\">// levels.ts — additions<\u002Fspan>\n<span class=\"k\">export interface<\u002Fspan> Level {\n  name: <span class=\"k\">string<\u002Fspan>;\n  grid: <span class=\"k\">string<\u002Fspan>[];\n  world: <span class=\"k\">number<\u002Fspan>;        <span class=\"c\">// NEW · 1-based world id<\u002Fspan>\n}\n\n<span class=\"k\">export interface<\u002Fspan> World {\n  id:   <span class=\"k\">number<\u002Fspan>;\n  name: <span class=\"k\">string<\u002Fspan>;        <span class=\"c\">// \"Meadow &amp; Sky\"<\u002Fspan>\n  mood: <span class=\"k\">string<\u002Fspan>;        <span class=\"c\">// \"daytime\" | \"candy-night\" — label only<\u002Fspan>\n  sky:  [<span class=\"k\">string<\u002Fspan>,<span class=\"k\">string<\u002Fspan>,<span class=\"k\">string<\u002Fspan>]; <span class=\"c\">// gradient stops, top→bottom<\u002Fspan>\n  twinkles: <span class=\"k\">number<\u002Fspan>;    <span class=\"c\">// decor density override (26 today)<\u002Fspan>\n}\n\n<span class=\"k\">export const<\u002Fspan> <span class=\"f\">WORLDS<\u002Fspan>: World[] = [\n  { id:<span class=\"n\">1<\u002Fspan>, name:<span class=\"s\">'Meadow &amp; Sky'<\u002Fspan>,     mood:<span class=\"s\">'daytime'<\u002Fspan>,\n    sky:[<span class=\"s\">'#9ed8ff'<\u002Fspan>,<span class=\"s\">'#c5ecff'<\u002Fspan>,<span class=\"s\">'#eafff4'<\u002Fspan>], twinkles:<span class=\"n\">18<\u002Fspan> },\n  { id:<span class=\"n\">2<\u002Fspan>, name:<span class=\"s\">'Starlight &amp; Sugar'<\u002Fspan>, mood:<span class=\"s\">'candy-night'<\u002Fspan>,\n    sky:[<span class=\"s\">'#4a3b8f'<\u002Fspan>,<span class=\"s\">'#8a5fc0'<\u002Fspan>,<span class=\"s\">'#d98fd0'<\u002Fspan>], twinkles:<span class=\"n\">40<\u002Fspan> },\n];\n\n<span class=\"c\">// each LEVELS entry gains:  world: 1  (×5)  then  world: 2  (×5)<\u002Fspan><\u002Fpre>\n    <p class=\"note\">Backwards-compatible: if <code>world<\u002Fcode> is ever missing, fall back to <code>Math.floor(idx / 5) + 1<\u002Fcode>. <span class=\"mono\">drawBackground()<\u002Fspan> gains one argument — the active <code>World<\u002Fcode> — and reads <code>world.sky<\u002Fcode> / <code>world.twinkles<\u002Fcode> instead of today's constants.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ════════ 3 · UNLOCK + SAVE ════════ -->\n  <section>\n    <div class=\"sec-head\">\n      <span class=\"sec-no\">03<\u002Fspan>\n      <div>\n        <h2>Unlock rule &amp; where progress lives<\u002Fh2>\n        <p>There's no save system yet — only <code>brickles_hi<\u002Fcode>. Here's the smallest one that makes a level-select meaningful.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid2\">\n      <div class=\"card\">\n        <h4>The unlock rule<\u002Fh4>\n        <ul class=\"tight\">\n          <li><strong>Level 1 is always unlocked.<\u002Fstrong><\u002Fli>\n          <li><strong>Beat level N → unlock level N+1.<\u002Fstrong> Linear; the existing <code>levelClear()<\u002Fcode> already fires at the exact right moment.<\u002Fli>\n          <li><strong>Cleared levels stay cleared<\u002Fstrong> and are replayable — re-playing can only raise your best score, never re-lock anything.<\u002Fli>\n          <li><strong>Worlds gate by their first level.<\u002Fstrong> World 2 “opens” simply because beating level 5 unlocks level 6 — no separate world lock needed.<\u002Fli>\n        <\u002Ful>\n        <p class=\"note\">A level is therefore in exactly one of three states, derived — not stored separately:<\u002Fp>\n        <div class=\"legend\" style=\"margin-top:10px;\">\n          <div class=\"it\"><span class=\"sq d\"><\u002Fspan>Completed — <span class=\"mono\">best[idx] exists<\u002Fspan><\u002Fdiv>\n          <div class=\"it\"><span class=\"sq c\"><\u002Fspan>Unlocked — <span class=\"mono\">idx ≤ maxUnlocked<\u002Fspan><\u002Fdiv>\n          <div class=\"it\"><span class=\"sq l\"><\u002Fspan>Locked — <span class=\"mono\">idx &gt; maxUnlocked<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <h4>Where it persists — <span class=\"mono\">localStorage<\u002Fspan><\u002Fh4>\n        <p style=\"font-size:14px;\">One new key, sitting beside the existing <code>brickles_hi<\u002Fcode>. Stores the furthest unlock and a per-level best so completed tiles can show a number.<\u002Fp>\n<pre><span class=\"c\">// key: \"brickles_progress\"<\u002Fspan>\n<span class=\"k\">interface<\u002Fspan> Progress {\n  maxUnlocked: <span class=\"k\">number<\u002Fspan>;            <span class=\"c\">// 0-based, highest playable idx<\u002Fspan>\n  best: Record&lt;<span class=\"k\">number<\u002Fspan>,<span class=\"k\">number<\u002Fspan>&gt;;     <span class=\"c\">// idx → best score<\u002Fspan>\n}\n\n<span class=\"c\">// on levelClear(idx, score):<\u002Fspan>\np.maxUnlocked = <span class=\"f\">Math<\u002Fspan>.max(p.maxUnlocked, idx + <span class=\"n\">1<\u002Fspan>);\np.best[idx]   = <span class=\"f\">Math<\u002Fspan>.max(p.best[idx] ?? <span class=\"n\">0<\u002Fspan>, score);\n<span class=\"f\">localStorage<\u002Fspan>.setItem(<span class=\"s\">'brickles_progress'<\u002Fspan>, <span class=\"f\">JSON<\u002Fspan>.stringify(p));<\u002Fpre>\n        <p class=\"note\">Default when absent: <span class=\"mono\">{ maxUnlocked: 0, best: {} }<\u002Fspan> — only level 1 open. Capped at <code>LEVELS.length - 1<\u002Fcode>. No accounts, no server; clears with site data, same as the high score.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>How it fits the existing flow<\u002Fh3>\n    <p>One new state — <code>'levelselect'<\u002Fcode> — joins the seven in <span class=\"mono\">game.ts<\u002Fspan>. It's reachable from the screens that already exist, and every tile tap routes through the <code>buildLevel(idx)<\u002Fcode> you already have.<\u002Fp>\n    <div class=\"card flat\">\n      <div class=\"flow\">\n        <span class=\"state\">title<\u002Fspan>\n        <span class=\"arrow\">→<small>Levels btn<\u002Fsmall><\u002Fspan>\n        <span class=\"state new\">levelselect<\u002Fspan>\n        <span class=\"arrow\">→<small>tap tile<\u002Fsmall><\u002Fspan>\n        <span class=\"state\">serve<\u002Fspan>\n        <span class=\"arrow\">→<\u002Fspan>\n        <span class=\"state\">play<\u002Fspan>\n        <span class=\"arrow\">→<\u002Fspan>\n        <span class=\"state\">levelclear<\u002Fspan>\n        <span class=\"arrow\">↘<small>Level Map<\u002Fsmall><\u002Fspan>\n        <span class=\"state new\">levelselect<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"note\" style=\"margin-top:12px;\">Entry points: a <strong>“Choose Level”<\u002Fstrong> button on the <span class=\"mono\">title<\u002Fspan> overlay (next to Start, which now means “continue at your furthest level”); a <strong>“Level Map”<\u002Fstrong> button on the <span class=\"mono\">levelclear<\u002Fspan> overlay (beside Next) and on <span class=\"mono\">gameover<\u002Fspan>. Selecting a tile calls <code>buildLevel(idx); state = 'serve'; hideAll();<\u002Fcode> — identical to <code>nextLevel()<\u002Fcode> but with a chosen index.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"reco\" style=\"margin-top:18px;\">\n      <span class=\"ic\">✦<\u002Fspan>\n      <div>\n        <h4>Recommendation — build it as an HTML overlay, not a canvas state<\u002Fh4>\n        <p>Pause, game-over and title are already <code>.overlay<\u002Fcode> divs toggled by <code>show()/hideAll()<\u002Fcode>. A level grid is fundamentally a <strong>set of buttons with state<\u002Fstrong> — making it a 12th <code>overlay-levelselect<\u002Fcode> div reuses that exact machinery, gets keyboard/tap focus and scrolling for free, and keeps the render loop untouched. A canvas-drawn grid would mean hand-rolling hit-testing, focus and scroll for zero visual gain. Match the existing pattern.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════ 4 · MOCKUP ════════ -->\n  <section>\n    <div class=\"sec-head\">\n      <span class=\"sec-no\">04<\u002Fspan>\n      <div>\n        <h2>The screen — level select mockup<\u002Fh2>\n        <p>1080 × 1320, in-language. Two world bands, a dotted “map” trail, and the three tile states side by side. State shown: World 1 fully cleared, level 6 cleared, level 7 current, 8–10 locked.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"stage-wrap\">\n      <div class=\"device\">\n        <div class=\"scaler\">\n          <div class=\"screen\">\n            <!-- decor -->\n            <div class=\"cloud\" style=\"width:150px;height:46px;left:120px;top:230px;\"><\u002Fdiv>\n            <div class=\"cloud\" style=\"width:110px;height:36px;left:760px;top:300px;\"><\u002Fdiv>\n            <div class=\"cloud\" style=\"width:130px;height:40px;left:560px;top:880px;\"><\u002Fdiv>\n            <span class=\"sky-twk\" style=\"width:14px;height:14px;left:80px;top:180px;\"><\u002Fspan>\n            <span class=\"sky-twk\" style=\"width:10px;height:10px;left:980px;top:210px;\"><\u002Fspan>\n            <span class=\"sky-twk\" style=\"width:12px;height:12px;left:430px;top:150px;\"><\u002Fspan>\n            <span class=\"sky-twk\" style=\"width:9px;height:9px;left:900px;top:560px;\"><\u002Fspan>\n\n            <!-- top bar -->\n            <div class=\"scr-top\">\n              <div class=\"scr-back\">‹<\u002Fdiv>\n              <div class=\"scr-title\">Choose a Level<\u002Fdiv>\n              <div class=\"scr-prog\">6 / 10 ★<\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- ───── WORLD 1 ───── -->\n            <div class=\"band\">\n              <div class=\"band-head\">\n                <div class=\"band-pill\">\n                  <span class=\"wno\" style=\"background:#4db5ff;\">1<\u002Fspan>\n                  <span class=\"wtxt\"><b>Meadow &amp; Sky<\u002Fb><span>World 1 · 5 / 5 cleared<\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n                <div class=\"band-rule\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"tiles\">\n                <div class=\"trail\"><\u002Fdiv>\n                <div class=\"tile done\"><div class=\"pad\"><span class=\"badge\">★<\u002Fspan><span class=\"num\">1<\u002Fspan><span class=\"score\">12,400<\u002Fspan><\u002Fdiv><div class=\"nm\">Rainbow Land<\u002Fdiv><\u002Fdiv>\n                <div class=\"tile done\"><div class=\"pad\"><span class=\"badge\">★<\u002Fspan><span class=\"num\">2<\u002Fspan><span class=\"score\">9,860<\u002Fspan><\u002Fdiv><div class=\"nm\">Sprite Meadow<\u002Fdiv><\u002Fdiv>\n                <div class=\"tile done\"><div class=\"pad\"><span class=\"badge\">★<\u002Fspan><span class=\"num\">3<\u002Fspan><span class=\"score\">15,120<\u002Fspan><\u002Fdiv><div class=\"nm\">Twin Hearts<\u002Fdiv><\u002Fdiv>\n                <div class=\"tile done\"><div class=\"pad\"><span class=\"badge\">★<\u002Fspan><span class=\"num\">4<\u002Fspan><span class=\"score\">11,030<\u002Fspan><\u002Fdiv><div class=\"nm\">Color Castle<\u002Fdiv><\u002Fdiv>\n                <div class=\"tile done\"><div class=\"pad\"><span class=\"badge\">★<\u002Fspan><span class=\"num\">5<\u002Fspan><span class=\"score\">8,440<\u002Fspan><\u002Fdiv><div class=\"nm\">Sky Sprinkle<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- ───── WORLD 2 ───── -->\n            <div class=\"band dusk\">\n              <div class=\"band-head\">\n                <div class=\"band-pill\">\n                  <span class=\"wno\" style=\"background:#a87cff;\">2<\u002Fspan>\n                  <span class=\"wtxt\"><b>Starlight &amp; Sugar<\u002Fb><span>World 2 · 1 / 5 cleared<\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n                <div class=\"band-rule\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"tiles\">\n                <div class=\"trail\"><\u002Fdiv>\n                <div class=\"tile done\"><div class=\"pad\"><span class=\"badge\">★<\u002Fspan><span class=\"num\">6<\u002Fspan><span class=\"score\">10,700<\u002Fspan><\u002Fdiv><div class=\"nm\">Star Burst<\u002Fdiv><\u002Fdiv>\n                <div class=\"tile cur\"><div class=\"pad\"><span class=\"badge\">▶<\u002Fspan><span class=\"num\">7<\u002Fspan><span class=\"play\">PLAY<\u002Fspan><\u002Fdiv><div class=\"nm\">Candy Stripe<\u002Fdiv><\u002Fdiv>\n                <div class=\"tile lock\"><div class=\"pad\"><span class=\"badge\">🔒<\u002Fspan><span class=\"num\">8<\u002Fspan><\u002Fdiv><div class=\"nm\">Diamond Drop<\u002Fdiv><\u002Fdiv>\n                <div class=\"tile lock\"><div class=\"pad\"><span class=\"badge\">🔒<\u002Fspan><span class=\"num\">9<\u002Fspan><\u002Fdiv><div class=\"nm\">Checkerboard<\u002Fdiv><\u002Fdiv>\n                <div class=\"tile lock\"><div class=\"pad\"><span class=\"badge\">🔒<\u002Fspan><span class=\"num\">10<\u002Fspan><\u002Fdiv><div class=\"nm\">???<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"scr-foot\">Tap a glowing tile to play · cleared levels can be replayed for a better score<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"caption\">Mockup rendered at the game's true 1080×1320 and scaled to fit. Locked tile names hide once you're deep enough into a world (level 10 reads “???”) to keep a little mystery.<\u002Fp>\n\n    <div class=\"grid3\" style=\"margin-top:26px;\">\n      <div class=\"card\">\n        <h4>Completed tile<\u002Fh4>\n        <p style=\"font-size:13.5px;\">Full-colour, mint-tinted fill, gold <strong>★<\u002Fstrong> badge, best score in mono. Always tappable → replays the level.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h4>Current / unlocked tile<\u002Fh4>\n        <p style=\"font-size:13.5px;\">The single furthest playable, not-yet-cleared level. Honey-yellow fill, <strong>orange glow ring<\u002Fstrong>, a ▶ badge and a “PLAY” pill — the obvious next tap.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h4>Locked tile<\u002Fh4>\n        <p style=\"font-size:13.5px;\">Desaturated lilac hatch, grey ink, padlock badge, no score. Not focusable, ignores taps — but still shows its number so progress reads at a glance.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>Layout notes for build<\u002Fh3>\n    <ul class=\"tight\">\n      <li><strong>Bands<\u002Fstrong> — one per world, stacked. Header is a chunky pill (world number disc in the world's signature hue + name + “x / 5 cleared”) followed by a dashed rule.<\u002Fli>\n      <li><strong>Tiles<\u002Fstrong> — 5 across, ~168px, joined by a dashed ink trail behind them for the board-game “map” read. On a phone the screen is portrait so two rows of five fit without scrolling; if more worlds arrive later, the overlay scrolls vertically.<\u002Fli>\n      <li><strong>Top bar<\u002Fstrong> — back chevron (to title) left, “Choose a Level” centre, “6 / 10 ★” progress right.<\u002Fli>\n      <li><strong>No new art<\u002Fstrong> — every pixel here is CSS/canvas primitives + the existing ink + RB palette + Fredoka. Nothing needs an illustrator.<\u002Fli>\n    <\u002Ful>\n  <\u002Fsection>\n\n  <footer class=\"doc\">\n    <span>Brickles · Worlds &amp; Level Select — design spec<\u002Fspan>\n    <span>Soft-pastel + dark-ink · #34215a · Fredoka<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
